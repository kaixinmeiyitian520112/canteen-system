<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>学生订餐 - 校园食堂智能推荐系统</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background-color: #f8f9fa; }
    .dish-card { transition: transform 0.2s; cursor: pointer; }
    .dish-card:hover { transform: translateY(-5px); box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
    .portion-selector { display: flex; gap: 10px; }
    .portion-btn { min-width: 80px; }
    .cart-badge { position: absolute; top: -8px; right: -8px; }
    .order-summary { position: sticky; bottom: 0; background: white; padding: 15px; border-top: 1px solid #dee2e6; }
  </style>
</head>
<body>
  <!-- 导航栏 -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
      <a class="navbar-brand" href="#">🍽️ 校园食堂智能推荐系统</a>
      <div class="d-flex align-items-center">
        <span class="text-white me-3" id="userInfo">欢迎，张三</span>
        <button class="btn btn-outline-light" onclick="logout()">退出登录</button>
      </div>
    </div>
  </nav>

  <!-- 主内容区 -->
  <div class="container my-4">
    <div class="row">
      <!-- 菜品列表 -->
      <div class="col-md-8">
        <h2 class="mb-4">📋 明日菜品列表 (2026-04-15)</h2>
        
        <!-- 加载状态 -->
        <div id="loading" class="text-center py-5">
          <div class="spinner-border text-primary" role="status">
            <span class="visually-hidden">加载中...</span>
          </div>
          <p class="mt-3">正在加载菜品数据...</p>
        </div>

        <!-- 菜品网格 -->
        <div id="dishList" class="row g-4" style="display: none;">
          <!-- 动态渲染菜品卡片 -->
        </div>
      </div>

      <!-- 购物车/订单摘要 -->
      <div class="col-md-4">
        <div class="card shadow-sm">
          <div class="card-header bg-success text-white">
            <h5 class="mb-0">🛒 我的订单</h5>
          </div>
          <div class="card-body">
            <div id="cartItems">
              <p class="text-muted text-center py-3">购物车为空，请选择菜品</p>
            </div>
            <hr>
            <div class="d-flex justify-content-between">
              <strong>总计:</strong>
              <strong class="text-primary">¥<span id="totalAmount">0.00</span></strong>
            </div>
          </div>
          <div class="card-footer">
            <button class="btn btn-primary w-100" id="submitOrderBtn" disabled onclick="submitOrder()">
              提交订单
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- 订单成功弹窗 -->
  <div class="modal fade" id="orderSuccessModal" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header bg-success text-white">
          <h5 class="modal-title">✅ 订单提交成功</h5>
          <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body" id="orderDetails"></div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">关闭</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/student-order.js"></script>
</body>
</html>
