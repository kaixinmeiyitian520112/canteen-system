<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登录 - 校园食堂智能推荐系统</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    body {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-container {
      max-width: 450px;
      width: 100%;
    }
    .login-card {
      border: none;
      border-radius: 15px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
    }
    .login-header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border-radius: 15px 15px 0 0;
      padding: 30px;
      text-align: center;
      color: white;
    }
    .login-header h2 {
      margin: 0;
      font-weight: 600;
    }
    .login-header p {
      margin: 10px 0 0;
      opacity: 0.9;
    }
    .role-selector {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }
    .role-btn {
      flex: 1;
      padding: 12px;
      border: 2px solid #dee2e6;
      border-radius: 10px;
      background: white;
      cursor: pointer;
      transition: all 0.3s;
      text-align: center;
    }
    .role-btn:hover {
      border-color: #667eea;
      transform: translateY(-2px);
    }
    .role-btn.active {
      border-color: #667eea;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }
    .role-btn i {
      font-size: 2rem;
      display: block;
      margin-bottom: 5px;
    }
    .form-control:focus {
      border-color: #667eea;
      box-shadow: 0 0 0 0.2rem rgba(102, 126, 234, 0.25);
    }
    .btn-login {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border: none;
      padding: 12px;
      font-size: 1.1rem;
      font-weight: 600;
    }
    .btn-login:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
    }
    .test-accounts {
      background: #f8f9fa;
      border-radius: 10px;
      padding: 15px;
      margin-top: 20px;
    }
    .test-accounts h6 {
      font-size: 0.9rem;
      color: #6c757d;
      margin-bottom: 10px;
    }
    .account-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px;
      margin-bottom: 5px;
      background: white;
      border-radius: 5px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .account-item:hover {
      background: #e9ecef;
    }
    .account-item:last-child {
      margin-bottom: 0;
    }
    .alert-error {
      display: none;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="card login-card">
      <!-- 登录头部 -->
      <div class="login-header">
        <h2><i class="bi bi-cup-hot-fill"></i> 校园食堂智能推荐系统</h2>
        <p>「光盘」行动，从我做起</p>
      </div>

      <!-- 登录表单 -->
      <div class="card-body p-4">
        <!-- 角色选择 -->
        <div class="role-selector">
          <div class="role-btn active" data-role="student" onclick="selectRole('student')">
            <i class="bi bi-person-fill"></i>
            <div>学生</div>
          </div>
          <div class="role-btn" data-role="admin" onclick="selectRole('admin')">
            <i class="bi bi-shield-lock-fill"></i>
            <div>管理员</div>
          </div>
        </div>

        <!-- 错误提示 -->
        <div class="alert alert-danger alert-error" id="errorAlert">
          <i class="bi bi-exclamation-circle-fill"></i>
          <span id="errorMessage">账号或密码错误</span>
        </div>

        <!-- 登录表单 -->
        <form id="loginForm" onsubmit="handleLogin(event)">
          <div class="mb-3">
            <label for="username" class="form-label">
              <i class="bi bi-person-badge"></i> 账号
            </label>
            <input 
              type="text" 
              class="form-control" 
              id="username" 
              placeholder="请输入账号"
              autocomplete="username"
              required
            >
          </div>

          <div class="mb-3">
            <label for="password" class="form-label">
              <i class="bi bi-lock-fill"></i> 密码
            </label>
            <input 
              type="password" 
              class="form-control" 
              id="password" 
              placeholder="请输入密码"
              autocomplete="current-password"
              required
            >
          </div>

          <div class="mb-3 form-check">
            <input type="checkbox" class="form-check-input" id="rememberMe">
            <label class="form-check-label" for="rememberMe">记住我</label>
          </div>

          <button type="submit" class="btn btn-primary btn-login w-100" id="loginBtn">
            <i class="bi bi-box-arrow-in-right"></i> 登录
          </button>
        </form>

        <!-- 测试账号 -->
        <div class="test-accounts">
          <h6><i class="bi bi-lightbulb-fill"></i> 快速测试账号</h6>
          <div class="account-item" onclick="fillAccount('stu1', '123456', 'student')">
            <div>
              <strong>张三</strong>
              <small class="text-muted ms-2">stu1</small>
            </div>
            <span class="badge bg-primary">学生</span>
          </div>
          <div class="account-item" onclick="fillAccount('stu2', '123456', 'student')">
            <div>
              <strong>李四</strong>
              <small class="text-muted ms-2">stu2</small>
            </div>
            <span class="badge bg-primary">学生</span>
          </div>
          <div class="account-item" onclick="fillAccount('admin', '123456', 'admin')">
            <div>
              <strong>管理员</strong>
              <small class="text-muted ms-2">admin</small>
            </div>
            <span class="badge bg-danger">管理员</span>
          </div>
        </div>
      </div>
    </div>

    <!-- 底部信息 -->
    <div class="text-center mt-3 text-white">
      <small>Sprint 3 - 现代工具链协作与系统解耦</small>
      <br>
      <small>&copy; 2026 Xi-xi512 Team</small>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/login.js"></script>
</body>
</html>
