openapi: 3.0.3
info:
  title: 校园食堂智能推荐系统 API
  description: |
    校园食堂「光盘」行动智能推荐系统的 RESTful API 契约文件。
    此文件作为前后端 Mock 开发与集成联调的"法定依据"。
    
    **测试账号:**
    - 学生: stu1 / 123456 (张三)
    - 学生: stu2 / 123456 (李四)
    - 管理员: admin / 123456
  version: 1.0.0
  contact:
    name: Xi-xi512 Team
    email: team@canteen-system.local

servers:
  - url: http://localhost:8080/api/v1
    description: 本地开发环境

tags:
  - name: auth
    description: 认证与授权
  - name: dishes
    description: 菜品管理
  - name: orders
    description: 订单管理
  - name: admin
    description: 管理员统计

paths:
  # ========== 认证模块 ==========
  /auth/login:
    post:
      tags:
        - auth
      summary: 用户登录
      description: 验证用户账号密码，返回 JWT Token
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
            examples:
              student:
                summary: 学生登录
                value:
                  username: "stu1"
                  password: "123456"
              admin:
                summary: 管理员登录
                value:
                  username: "admin"
                  password: "123456"
      responses:
        '200':
          description: 登录成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
              examples:
                student:
                  value:
                    token: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
                    user:
                      username: "stu1"
                      role: "student"
                      name: "张三"
                admin:
                  value:
                    token: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
                    user:
                      username: "admin"
                      role: "admin"
                      name: "管理员"
        '401':
          description: 账号或密码错误
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: 401
                message: "账号或密码错误"
                timestamp: "2026-04-14T10:30:00Z"

  /auth/logout:
    post:
      tags:
        - auth
      summary: 用户登出
      description: 使当前 Token 失效
      operationId: logout
      security:
        - BearerAuth: []
      responses:
        '200':
          description: 登出成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
              example:
                code: 200
                message: "登出成功"
        '401':
          description: 未授权
          $ref: '#/components/responses/Unauthorized'

  # ========== 菜品模块 ==========
  /dishes:
    get:
      tags:
        - dishes
      summary: 获取今日菜品列表
      description: 返回明日食堂供应的所有菜品信息
      operationId: listDishes
      security:
        - BearerAuth: []
      parameters:
        - name: date
          in: query
          description: 查询日期（默认明日）
          schema:
            type: string
            format: date
            example: "2026-04-15"
      responses:
        '200':
          description: 成功获取菜品列表
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DishListResponse'
              example:
                code: 200
                data:
                  - id: "D001"
                    name: "红烧肉"
                    description: "经典家常菜，肥而不腻"
                    price: 12.00
                    category: "荤菜"
                    portions:
                      - type: "whole"
                        label: "整份"
                        price: 12.00
                      - type: "half"
                        label: "半份"
                        price: 6.00
                    remaining: 50
                    image: "/images/dishes/D001.jpg"
        '401':
          $ref: '#/components/responses/Unauthorized'

  /dishes/{dishId}:
    get:
      tags:
        - dishes
      summary: 获取菜品详情
      description: 根据菜品 ID 获取详细信息
      operationId: getDish
      security:
        - BearerAuth: []
      parameters:
        - name: dishId
          in: path
          required: true
          schema:
            type: string
            example: "D001"
      responses:
        '200':
          description: 成功获取菜品详情
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DishDetailResponse'
        '404':
          description: 菜品不存在
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: 404
                message: "菜品不存在"

  # ========== 订单模块 ==========
  /orders:
    post:
      tags:
        - orders
      summary: 提交订单
      description: 学生选择菜品和份量后提交订单
      operationId: createOrder
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateOrderRequest'
            examples:
              single:
                summary: 单菜品订单
                value:
                  dishId: "D001"
                  portion: "whole"
                  quantity: 1
              multiple:
                summary: 多菜品订单
                value:
                  items:
                    - dishId: "D001"
                      portion: "whole"
                      quantity: 1
                    - dishId: "D002"
                      portion: "half"
                      quantity: 1
      responses:
        '201':
          description: 订单创建成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderResponse'
              example:
                code: 201
                data:
                  id: "ORD0001"
                  userId: "stu1"
                  userName: "张三"
                  items:
                    - dishId: "D001"
                      dishName: "红烧肉"
                      portion: "whole"
                      portionLabel: "整份"
                      quantity: 1
                      price: 12.00
                  totalAmount: 12.00
                  status: "confirmed"
                  orderDate: "2026-04-14T10:30:00Z"
                  deliveryDate: "2026-04-15"
        '400':
          description: 请求参数错误
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: 400
                message: "菜品库存不足"
        '401':
          $ref: '#/components/responses/Unauthorized'

    get:
      tags:
        - orders
      summary: 获取我的订单列表
      description: 返回当前用户的所有订单
      operationId: listMyOrders
      security:
        - BearerAuth: []
      parameters:
        - name: status
          in: query
          description: 订单状态过滤
          schema:
            type: string
            enum: [pending, confirmed, completed, cancelled]
        - name: page
          in: query
          description: 页码
          schema:
            type: integer
            default: 1
        - name: size
          in: query
          description: 每页数量
          schema:
            type: integer
            default: 10
      responses:
        '200':
          description: 成功获取订单列表
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderListResponse'

  /orders/{orderId}:
    get:
      tags:
        - orders
      summary: 获取订单详情
      description: 根据订单 ID 获取详细信息
      operationId: getOrder
      security:
        - BearerAuth: []
      parameters:
        - name: orderId
          in: path
          required: true
          schema:
            type: string
            example: "ORD0001"
      responses:
        '200':
          description: 成功获取订单详情
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderResponse'
        '404':
          description: 订单不存在
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: 404
                message: "订单不存在"

    delete:
      tags:
        - orders
      summary: 取消订单
      description: 取消指定订单（仅订单创建者或管理员可操作）
      operationId: cancelOrder
      security:
        - BearerAuth: []
      parameters:
        - name: orderId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 订单取消成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
              example:
                code: 200
                message: "订单已取消"
        '403':
          description: 无权限操作
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: 403
                message: "无权限取消此订单"

  # ========== 管理员统计模块 ==========
  /admin/statistics/orders:
    get:
      tags:
        - admin
      summary: 获取订餐统计报表
      description: 管理员查看订餐总人数、各菜品总需求量
      operationId: getOrderStatistics
      security:
        - BearerAuth: []
      parameters:
        - name: date
          in: query
          description: 统计日期
          schema:
            type: string
            format: date
            example: "2026-04-15"
      responses:
        '200':
          description: 成功获取统计数据
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatisticsResponse'
              example:
                code: 200
                data:
                  date: "2026-04-15"
                  totalOrders: 45
                  totalUsers: 38
                  dishStatistics:
                    - dishId: "D001"
                      dishName: "红烧肉"
                      totalQuantity: 25
                      wholePortion: 20
                      halfPortion: 5
                    - dishId: "D002"
                      dishName: "宫保鸡丁"
                      totalQuantity: 18
                      wholePortion: 10
                      halfPortion: 8
        '403':
          description: 仅管理员可访问
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: 403
                message: "仅管理员可访问此接口"

  /admin/users:
    get:
      tags:
        - admin
      summary: 获取用户列表
      description: 管理员查看所有用户信息
      operationId: listUsers
      security:
        - BearerAuth: []
      responses:
        '200':
          description: 成功获取用户列表
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/User'

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  responses:
    Unauthorized:
      description: 未授权访问
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            code: 401
            message: "未授权，请先登录"
            timestamp: "2026-04-14T10:30:00Z"

  schemas:
    # ========== 通用响应 ==========
    SuccessResponse:
      type: object
      properties:
        code:
          type: integer
          example: 200
        message:
          type: string
          example: "操作成功"

    ErrorResponse:
      type: object
      properties:
        code:
          type: integer
          example: 400
        message:
          type: string
          example: "请求参数错误"
        timestamp:
          type: string
          format: date-time

    # ========== 认证相关 ==========
    LoginRequest:
      type: object
      required:
        - username
        - password
      properties:
        username:
          type: string
          example: "stu1"
        password:
          type: string
          format: password
          example: "123456"

    LoginResponse:
      type: object
      properties:
        code:
          type: integer
          example: 200
        data:
          type: object
          properties:
            token:
              type: string
            user:
              $ref: '#/components/schemas/User'

    User:
      type: object
      properties:
        username:
          type: string
          example: "stu1"
        role:
          type: string
          enum: [student, admin]
          example: "student"
        name:
          type: string
          example: "张三"

    # ========== 菜品相关 ==========
    Dish:
      type: object
      properties:
        id:
          type: string
          example: "D001"
        name:
          type: string
          example: "红烧肉"
        description:
          type: string
          example: "经典家常菜，肥而不腻"
        price:
          type: number
          format: float
          example: 12.00
        category:
          type: string
          example: "荤菜"
        portions:
          type: array
          items:
            $ref: '#/components/schemas/Portion'
        remaining:
          type: integer
          example: 50
        image:
          type: string
          example: "/images/dishes/D001.jpg"

    Portion:
      type: object
      properties:
        type:
          type: string
          enum: [whole, half]
          example: "whole"
        label:
          type: string
          example: "整份"
        price:
          type: number
          format: float
          example: 12.00

    DishListResponse:
      type: object
      properties:
        code:
          type: integer
        data:
          type: array
          items:
            $ref: '#/components/schemas/Dish'

    DishDetailResponse:
      type: object
      properties:
        code:
          type: integer
        data:
          $ref: '#/components/schemas/Dish'

    # ========== 订单相关 ==========
    CreateOrderRequest:
      type: object
      oneOf:
        - required: [dishId, portion]
        - required: [items]
      properties:
        dishId:
          type: string
          example: "D001"
        portion:
          type: string
          enum: [whole, half]
          example: "whole"
        quantity:
          type: integer
          default: 1
        items:
          type: array
          items:
            type: object
            properties:
              dishId:
                type: string
              portion:
                type: string
                enum: [whole, half]
              quantity:
                type: integer
                default: 1

    OrderItem:
      type: object
      properties:
        dishId:
          type: string
        dishName:
          type: string
        portion:
          type: string
        portionLabel:
          type: string
        quantity:
          type: integer
        price:
          type: number
          format: float

    Order:
      type: object
      properties:
        id:
          type: string
          example: "ORD0001"
        userId:
          type: string
          example: "stu1"
        userName:
          type: string
          example: "张三"
        items:
          type: array
          items:
            $ref: '#/components/schemas/OrderItem'
        totalAmount:
          type: number
          format: float
          example: 12.00
        status:
          type: string
          enum: [pending, confirmed, completed, cancelled]
        orderDate:
          type: string
          format: date-time
        deliveryDate:
          type: string
          format: date

    OrderResponse:
      type: object
      properties:
        code:
          type: integer
        data:
          $ref: '#/components/schemas/Order'

    OrderListResponse:
      type: object
      properties:
        code:
          type: integer
        data:
          type: array
          items:
            $ref: '#/components/schemas/Order'
        pagination:
          type: object
          properties:
            page:
              type: integer
            size:
              type: integer
            total:
              type: integer

    # ========== 统计相关 ==========
    DishStatistics:
      type: object
      properties:
        dishId:
          type: string
        dishName:
          type: string
        totalQuantity:
          type: integer
        wholePortion:
          type: integer
        halfPortion:
          type: integer

    StatisticsResponse:
      type: object
      properties:
        code:
          type: integer
        data:
          type: object
          properties:
            date:
              type: string
              format: date
            totalOrders:
              type: integer
            totalUsers:
              type: integer
            dishStatistics:
              type: array
              items:
                $ref: '#/components/schemas/DishStatistics'
