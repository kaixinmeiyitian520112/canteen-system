<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>校园食堂订餐系统 - 前端演示</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        /* 页面卡片样式 */
        .page-card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
            margin-bottom: 30px;
        }

        .page-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px 30px;
        }

        .page-header h2 {
            font-size: 24px;
            margin-bottom: 5px;
        }

        .page-header p {
            opacity: 0.9;
            font-size: 14px;
        }

        .page-body {
            padding: 30px;
        }

        /* 表单样式 */
        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
        }

        input, select {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            transition: all 0.3s;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #667eea;
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
        }

        /* 菜品列表样式 */
        .dishes-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .dish-card {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 20px;
            cursor: pointer;
            transition: all 0.3s;
            border: 2px solid transparent;
        }

        .dish-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .dish-card.selected {
            border-color: #667eea;
            background: #f0f0ff;
        }

        .dish-name {
            font-size: 18px;
            font-weight: 700;
            color: #333;
            margin-bottom: 8px;
        }

        .dish-price {
            color: #667eea;
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 5px;
        }

        .dish-desc {
            color: #666;
            font-size: 13px;
        }

        /* 消息提示 */
        .message {
            padding: 12px 20px;
            border-radius: 10px;
            margin-top: 20px;
            display: none;
        }

        .message.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            display: block;
        }

        .message.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            display: block;
        }

        /* 订单信息 */
        .order-info {
            background: #f0f4ff;
            border-radius: 15px;
            padding: 20px;
            margin-top: 20px;
        }

        .status-badge {
            display: inline-block;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        .status-online {
            background: #28a745;
            color: white;
        }

        .status-offline {
            background: #dc3545;
            color: white;
        }

        /* 导航标签 */
        .nav-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
        }

        .nav-tab {
            flex: 1;
            text-align: center;
            padding: 15px;
            background: rgba(255,255,255,0.2);
            color: white;
            border-radius: 15px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }

        .nav-tab.active {
            background: white;
            color: #667eea;
        }

        .page {
            display: none;
        }

        .page.active {
            display: block;
        }

        /* API 状态 */
        .api-status {
            text-align: right;
            margin-bottom: 20px;
            font-size: 14px;
        }
    </style>
</head>
<body>
<div class="container">
    <!-- API 状态指示器 -->
    <div class="api-status">
        <span class="status-badge" id="apiStatus">⚡ 检查 API 状态...</span>
    </div>

    <!-- 导航标签 -->
    <div class="nav-tabs">
        <div class="nav-tab active" data-page="login">🔐 用户登录</div>
        <div class="nav-tab" data-page="order">🍽️ 在线订餐</div>
    </div>

    <!-- ==================== 核心业务页面 1：用户登录 ==================== -->
    <div id="loginPage" class="page active">
        <div class="page-card">
            <div class="page-header">
                <h2>🔐 用户登录</h2>
                <p>请使用测试账号登录系统</p>
            </div>
            <div class="page-body">
                <form id="loginForm">
                    <div class="form-group">
                        <label>📱 账号</label>
                        <input type="text" id="username" placeholder="请输入账号" value="stu1">
                    </div>
                    <div class="form-group">
                        <label>🔒 密码</label>
                        <input type="password" id="password" placeholder="请输入密码" value="123456">
                    </div>
                    <button type="submit">登录系统</button>
                </form>

                <div class="order-info" style="margin-top: 20px;">
                    <strong>📢 测试账号：</strong><br>
                    学生账号：stu1 / 123456 (张三)<br>
                    学生账号：stu2 / 123456 (李四)<br>
                    管理员：admin / 123456
                </div>

                <div id="loginMessage" class="message"></div>
            </div>
        </div>
    </div>

    <!-- ==================== 核心业务页面 2：在线订餐 ==================== -->
    <div id="orderPage" class="page">
        <div class="page-card">
            <div class="page-header">
                <h2>🍽️ 在线订餐</h2>
                <p>选择您喜欢的菜品，预定明日午餐</p>
            </div>
            <div class="page-body">
                <div id="userInfo" style="margin-bottom: 20px; padding: 15px; background: #e8f4f8; border-radius: 10px;">
                    ⚠️ 请先登录
                </div>

                <h3>📋 今日菜品</h3>
                <div id="dishesList" class="dishes-grid">
                    <div style="text-align: center; grid-column: 1/-1;">加载中...</div>
                </div>

                <div class="form-group" style="margin-top: 20px;">
                    <label>🍽️ 份量选择</label>
                    <select id="portion">
                        <option value="whole">整份 (原价)</option>
                        <option value="half">半份 (半价)</option>
                    </select>
                </div>

                <button id="submitOrderBtn" disabled>提交订单</button>

                <div id="orderMessage" class="message"></div>
            </div>
        </div>
    </div>
</div>

<script>
    // API 配置
    const API_BASE_URL = 'http://localhost:4010';
    let currentUser = null;
    let selectedDish = null;
    let apiAvailable = false;

    // 检查 API 服务器状态
    async function checkAPIStatus() {
        const statusEl = document.getElementById('apiStatus');
        try {
            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), 3000);
            const response = await fetch(`${API_BASE_URL}/dishes`, { signal: controller.signal });
            clearTimeout(timeoutId);
            if (response.ok) {
                apiAvailable = true;
                statusEl.innerHTML = '🟢 Mock 服务器在线';
                statusEl.className = 'status-badge status-online';
            } else {
                throw new Error('API 响应错误');
            }
        } catch (error) {
            apiAvailable = false;
            statusEl.innerHTML = '🔴 Mock 服务器离线 (使用模拟数据)';
            statusEl.className = 'status-badge status-offline';
            console.log('⚠️ Prism 未启动，使用模拟响应模式');
        }
    }

    // 模拟 API 响应（当 Prism 未启动时使用）
    function mockLogin(username, password) {
        if (username === 'stu1' && password === '123456') {
            return { success: true, username: 'stu1', name: '张三', role: 'student' };
        }
        if (username === 'admin' && password === '123456') {
            return { success: true, username: 'admin', name: '管理员', role: 'admin' };
        }
        return { success: false, message: '账号或密码错误' };
    }

    function mockGetDishes() {
        return [
            { id: 'D001', name: '红烧肉', price: 12.0, description: '肥而不腻，入口即化' },
            { id: 'D002', name: '宫保鸡丁', price: 10.0, description: '鲜香微辣，口感丰富' },
            { id: 'D003', name: '麻婆豆腐', price: 6.0, description: '麻辣鲜香，下饭神器' },
            { id: 'D004', name: '清蒸鱼', price: 15.0, description: '鲜嫩多汁，营养健康' },
            { id: 'D005', name: '炒时蔬', price: 5.0, description: '新鲜时令蔬菜' }
        ];
    }

    function mockCreateOrder(dishId, portion, user) {
        const dishes = mockGetDishes();
        const dish = dishes.find(d => d.id === dishId);
        if (!dish) return { error: '菜品不存在' };
        const price = portion === 'half' ? dish.price / 2 : dish.price;
        return {
            orderId: 'ORD' + Date.now(),
            dishName: dish.name,
            portion: portion,
            price: price,
            date: new Date(Date.now() + 86400000).toISOString().split('T')[0]
        };
    }

    // 调用登录 API
    async function callLoginAPI(username, password) {
        if (apiAvailable) {
            try {
                const response = await fetch(`${API_BASE_URL}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                return await response.json();
            } catch (error) {
                return mockLogin(username, password);
            }
        }
        return mockLogin(username, password);
    }

    // 调用菜品 API
    async function callGetDishesAPI() {
        if (apiAvailable) {
            try {
                const response = await fetch(`${API_BASE_URL}/dishes`);
                return await response.json();
            } catch (error) {
                return mockGetDishes();
            }
        }
        return mockGetDishes();
    }

    // 调用创建订单 API
    async function callCreateOrderAPI(dishId, portion) {
        if (apiAvailable) {
            try {
                const response = await fetch(`${API_BASE_URL}/orders`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ dishId, portion, userId: currentUser?.username })
                });
                return await response.json();
            } catch (error) {
                return mockCreateOrder(dishId, portion, currentUser);
            }
        }
        return mockCreateOrder(dishId, portion, currentUser);
    }

    // 处理登录
    async function handleLogin(event) {
        event.preventDefault();
        const username = document.getElementById('username').value;
        const password = document.getElementById('password').value;
        const messageEl = document.getElementById('loginMessage');

        messageEl.className = 'message';
        messageEl.innerHTML = '⏳ 登录中...';
        messageEl.style.display = 'block';

        const result = await callLoginAPI(username, password);

        if (result.success || (result.username && result.name)) {
            currentUser = {
                username: result.username || username,
                name: result.name || (username === 'stu1' ? '张三' : '用户'),
                role: result.role || 'student'
            };
            messageEl.className = 'message success';
            messageEl.innerHTML = `✅ 登录成功！欢迎，${currentUser.name}`;

            // 切换到订餐页面
            setTimeout(() => {
                document.querySelector('.nav-tab[data-page="order"]').click();
            }, 1500);
        } else {
            messageEl.className = 'message error';
            messageEl.innerHTML = `❌ 登录失败：${result.message || '账号或密码错误'}`;
        }
    }

    // 加载菜品列表
    async function loadDishes() {
        const dishes = await callGetDishesAPI();
        const container = document.getElementById('dishesList');

        if (!dishes || dishes.length === 0) {
            container.innerHTML = '<div style="text-align: center; grid-column: 1/-1;">暂无菜品数据</div>';
            return;
        }

        container.innerHTML = dishes.map(dish => `
                <div class="dish-card" data-dish-id="${dish.id}" data-dish-name="${dish.name}" data-dish-price="${dish.price}">
                    <div class="dish-name">${dish.name}</div>
                    <div class="dish-price">￥${dish.price}</div>
                    <div class="dish-desc">${dish.description || '美味佳肴'}</div>
                </div>
            `).join('');

        // 添加点击选中事件
        document.querySelectorAll('.dish-card').forEach(card => {
            card.addEventListener('click', () => {
                document.querySelectorAll('.dish-card').forEach(c => c.classList.remove('selected'));
                card.classList.add('selected');
                selectedDish = {
                    id: card.dataset.dishId,
                    name: card.dataset.dishName,
                    price: parseFloat(card.dataset.dishPrice)
                };
                document.getElementById('submitOrderBtn').disabled = false;
            });
        });
    }

    // 提交订单
    async function submitOrder() {
        if (!currentUser) {
            alert('请先登录');
            return;
        }
        if (!selectedDish) {
            alert('请先选择菜品');
            return;
        }

        const portion = document.getElementById('portion').value;
        const messageEl = document.getElementById('orderMessage');

        messageEl.className = 'message';
        messageEl.innerHTML = '⏳ 提交订单中...';
        messageEl.style.display = 'block';

        const result = await callCreateOrderAPI(selectedDish.id, portion);

        if (result.error) {
            messageEl.className = 'message error';
            messageEl.innerHTML = `❌ 订单失败：${result.error}`;
        } else if (result.orderId) {
            const portionText = portion === 'half' ? '半份' : '整份';
            messageEl.className = 'message success';
            messageEl.innerHTML = `
                    ✅ 订单提交成功！<br>
                    📦 订单号：${result.orderId}<br>
                    🍽️ 菜品：${result.dishName || selectedDish.name}<br>
                    📊 份量：${portionText}<br>
                    💰 价格：￥${result.price || (portion === 'half' ? selectedDish.price/2 : selectedDish.price)}<br>
                    📅 预定日期：${result.date || new Date(Date.now() + 86400000).toISOString().split('T')[0]}
                `;
            selectedDish = null;
            document.querySelectorAll('.dish-card').forEach(c => c.classList.remove('selected'));
            document.getElementById('submitOrderBtn').disabled = true;
        } else {
            messageEl.className = 'message error';
            messageEl.innerHTML = '❌ 订单提交失败，请重试';
        }
    }

    // 页面切换
    function switchPage(pageId) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(`${pageId}Page`).classList.add('active');

        if (pageId === 'order' && currentUser) {
            document.getElementById('userInfo').innerHTML = `
                    <strong>👤 当前用户：</strong> ${currentUser.name} (${currentUser.username})
                    <span style="margin-left: 20px;">🎓 角色：${currentUser.role === 'student' ? '学生' : '管理员'}</span>
                `;
            loadDishes();
        } else if (pageId === 'order' && !currentUser) {
            document.getElementById('userInfo').innerHTML = '⚠️ 请先登录后再订餐';
        }
    }

    // 事件绑定
    document.getElementById('loginForm').addEventListener('submit', handleLogin);
    document.getElementById('submitOrderBtn').addEventListener('click', submitOrder);

    document.querySelectorAll('.nav-tab').forEach(tab => {
        tab.addEventListener('click', () => {
            document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
            tab.classList.add('active');
            switchPage(tab.dataset.page);
        });
    });

    // 初始化
    checkAPIStatus();
</script>
</body>
</html>
